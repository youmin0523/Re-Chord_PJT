# nginx config for the Phase B frontend container.
#
#   /healthz      → cheap liveness probe for the healthcheck
#   /api/*        → reverse-proxied to the backend service (compose DNS)
#   /ws/*         → backend WebSocket upgrade
#   /*            → SPA fallback to index.html
#
# BACKEND_HOST is rendered at image build time via the default below; for
# bespoke deploys, override it by templating this file before COPY.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 512m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://backend:7860/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /ws/ {
        proxy_pass http://backend:7860/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (Vite fingerprints filenames).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp|webmanifest)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
