# nginx config for the Phase B frontend container.
#
#   /healthz      → cheap liveness probe for the healthcheck
#   /api/*        → reverse-proxied to the backend service (compose DNS)
#   /ws/*         → backend WebSocket upgrade
#   /*            → SPA fallback to index.html
#
# BACKEND_HOST is rendered at image build time via the default below; for
# bespoke deploys, override it by templating this file before COPY.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 512m;

    # ── Security headers ─────────────────────────────────────────────
    # Applied to every response (proxied + static). HSTS is conditional
    # so HTTP-only deployments don't accidentally lock browsers out;
    # when terminating TLS at a load balancer, the LB should add HSTS
    # OR you can uncomment the directive below.
    #
    # CSP allows: self for app code, Supabase auth endpoints + OpenAI
    # streaming + Sentry beacons (loosen further only if you add a new
    # third-party SDK; tighten the wildcards before going public).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline'; \
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
        font-src 'self' data: https://fonts.gstatic.com; \
        img-src 'self' data: blob: https:; \
        media-src 'self' blob: https:; \
        connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.ingest.sentry.io https://api.openai.com; \
        frame-ancestors 'none'; \
        base-uri 'self'; \
        form-action 'self';" always;
    # Uncomment when terminating TLS at this nginx (not behind a TLS LB):
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://backend:7860/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /ws/ {
        proxy_pass http://backend:7860/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (Vite fingerprints filenames).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp|webmanifest)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
