name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Backend: ruff + import-check + pytest (no-GPU lane).
  # Heavy GPU work (audio-separator) is NOT installed in CI — we only
  # verify the API surface compiles and the no-GPU pytest suites pass.
  # ────────────────────────────────────────────────────────────────────
  backend:
    name: backend (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install minimal deps (skip GPU stack)
        run: |
          uv venv --python ${{ matrix.python-version }}
          # Core API + the lightweight deps the no-GPU pytest lane needs:
          #   pretty_midi / music21 / verovio / svglib / reportlab → score render
          #   pyloudnorm → mastering true-peak/LUFS tests
          #   celery[redis] → Phase B worker wiring smoke (test_celery_dryrun)
          # We still skip torch / audio-separator / faster-whisper (GPU/heavy).
          uv pip install fastapi 'pydantic>=2.9' pydantic-settings python-multipart \
            'uvicorn[standard]' 'soundfile>=0.12.1' 'numpy<2.0' 'scipy>=1.13' \
            'librosa>=0.10.2' 'music21>=9.1' 'pretty_midi>=0.2.10' \
            'verovio>=4.3' 'svglib>=1.5' 'reportlab>=4.0' 'pyloudnorm>=0.1.1' \
            'celery[redis]>=5.4' \
            rich structlog typer ruff pytest httpx

      - name: ruff
        run: uv run ruff check backend/

      - name: import smoke
        run: |
          uv run python -c "
          from backend.app.main import app
          print('routes:', sum(1 for _ in app.routes))
          "

      # No-GPU pytest lane: runs the whole suite EXCEPT the three tests
      # that need GPU weights / a live separator (those run in a nightly
      # job with the heavy stack installed). New test files are picked up
      # automatically — no need to list them one by one.
      - name: pytest (no-GPU)
        run: |
          uv run python -m pytest -v \
            --ignore=tests/test_separation_regression.py \
            --ignore=tests/test_separation_4stem_regression.py \
            --ignore=tests/test_e2e_pipeline.py \
            tests/

  # ────────────────────────────────────────────────────────────────────
  # Frontend: ESLint + vite build + Playwright harness check.
  # ────────────────────────────────────────────────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint (changed components)
        # Fail on errors; warnings still print.
        run: npx eslint --max-warnings=999 src/components/BackendSummaryPanel.jsx
                src/components/AuxCuesEditor.jsx
                src/components/QualityPanel.jsx

      - name: Vitest (unit smoke)
        run: npm run test -- --reporter=default

      - run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - run: npx playwright test --list

  # ────────────────────────────────────────────────────────────────────
  # Accuracy gate — runs the synth-only measure script and compares
  # against tests/fixtures/accuracy_thresholds.json. Fails CI when a
  # metric drops below 'min'. Real-world (URL-grounded) measurement is
  # too slow / network-bound for CI; we run that as a nightly job.
  # ────────────────────────────────────────────────────────────────────
  accuracy:
    name: accuracy gate (synth)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install measure-script deps
        run: |
          uv venv --python 3.11
          uv pip install 'numpy<2.0' 'scipy>=1.13' 'librosa>=0.10.2' \
            'soundfile>=0.12.1' 'music21>=9.1' pytest

      - name: Run synth accuracy + gate
        env:
          # accuracy_thresholds.json is the source of truth — its min
          # values gate the run. Synth measurements alone don't need a
          # live backend.
          RECHORD_SKIP_REAL: "1"
        run: |
          uv run python -m pytest -v tests/test_accuracy_thresholds.py
          uv run python -m pytest -v tests/test_synth_4stem_smoke.py

  # ────────────────────────────────────────────────────────────────────
  # axe-core accessibility audit on Landing + /app.
  #
  # Runs the Playwright a11y.spec which boots the Vite dev server (no
  # backend needed for the page shells we audit) and feeds the rendered
  # DOM into axe. Fails on serious/critical WCAG violations.
  # ────────────────────────────────────────────────────────────────────
  a11y:
    name: a11y audit
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
      - name: axe audit (Landing + /app)
        run: npx playwright test e2e/a11y.spec.js --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: frontend/playwright-report
          retention-days: 7
