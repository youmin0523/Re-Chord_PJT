; Alembic config -- Phase B SaaS migrations.
; Run from project root:
;   alembic -c backend/app/db/alembic.ini upgrade head

[alembic]
script_location = backend/app/db/migrations
prepend_sys_path = .
version_path_separator = os
; sqlalchemy.url is injected at runtime from DATABASE_URL env var (see env.py).
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
